<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理测评中心</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #f7f6f2; color: #333; min-height: 100vh; }
        .serif { font-family: 'Noto Serif SC', serif; }
        [v-cloak] { display: none; }
        .input-field {
            background: transparent; border: none; border-bottom: 1px solid #333;
            width: 100%; padding: 12px 0; text-align: center; outline: none;
            letter-spacing: 0.2em; font-size: 14px; color: #333;
            font-family: 'Noto Sans SC', sans-serif; transition: border-color 0.3s;
        }
        .input-field::placeholder { color: #aaa; letter-spacing: 0.1em; }
        .input-field:focus { border-color: #000; }
        .btn-main {
            width: 100%; padding: 16px; background: #222; color: #fff; border: none;
            cursor: pointer; font-size: 11px; letter-spacing: 0.3em;
            font-family: 'Noto Sans SC', sans-serif; transition: background 0.3s;
        }
        .btn-main:hover { background: #000; }
        .btn-main:disabled { background: #999; cursor: not-allowed; }
        .status-msg { font-size: 11px; text-align: center; height: 18px; transition: color 0.3s; }
        .status-msg.error   { color: #c0392b; }
        .status-msg.loading { color: #aaa; }
        .deco-line { width: 1px; height: 60px; background: #ccc; margin: 0 auto 40px; }
        .test-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }
        .test-badge { border: 1px solid #ddd; padding: 6px 16px; font-size: 10px; letter-spacing: 0.2em; color: #aaa; background: #fff; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .a0 { animation: fadeUp 0.8s ease both; }
        .a1 { animation: fadeUp 0.8s 0.1s ease both; }
        .a2 { animation: fadeUp 0.8s 0.2s ease both; }
        .a3 { animation: fadeUp 0.8s 0.35s ease both; }
        .a4 { animation: fadeUp 0.8s 0.5s ease both; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
        .dot { display:inline-block; animation: blink 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
<div id="app" v-cloak style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="max-width:360px;width:100%;text-align:center;">
        <div class="deco-line a0"></div>
        <p class="a1" style="font-size:10px;letter-spacing:0.4em;color:#aaa;text-transform:uppercase;margin-bottom:16px;">Psychological Assessment Center</p>
        <h1 class="serif a2" style="font-size:26px;letter-spacing:0.3em;color:#222;margin-bottom:48px;">心理测评中心</h1>
        <div class="a3" style="margin-bottom:8px;">
            <input v-model="code" type="text" maxlength="12" placeholder="请输入激活码"
                class="input-field" :disabled="loading" @keyup.enter="verify">
        </div>
        <div class="status-msg a3" :class="msgClass" style="margin-bottom:20px;">
            <span v-if="loading">验证中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
            <span v-else-if="msg">{{ msg }}</span>
        </div>
        <div class="a4">
            <button class="btn-main" :disabled="loading" @click="verify">验证并进入测试</button>
        </div>
        <div class="test-badges a4">
            <span class="test-badge">MACH-IV</span>
            <span class="test-badge">MBTI</span>
            <!-- 新增测试时在这里加一个 badge -->
        </div>
        <p style="margin-top:32px;font-size:10px;color:#bbb;line-height:2;letter-spacing:0.05em;" class="a4">
            激活码可在购买后的订单详情中获取<br>每个激活码仅限一次有效测评
        </p>
    </div>
</div>
<script>
const { createApp, ref, computed } = Vue;
createApp({
    setup() {
        const code    = ref('');
        const loading = ref(false);
        const msg     = ref('');
        const isError = ref(false);
        const msgClass = computed(() => loading.value ? 'loading' : (isError.value ? 'error' : ''));
        let msgTimer = null;

        const showMsg = (text, error = true) => {
            msg.value = text; isError.value = error;
            if (msgTimer) clearTimeout(msgTimer);
            if (error) msgTimer = setTimeout(() => { msg.value = ''; }, 3500);
        };

        const verify = async () => {
            const input = code.value.trim();
            if (!input) { showMsg('请输入激活码'); return; }
            if (loading.value) return;
            loading.value = true; msg.value = '';
            try {
                // Cloudflare Pages Functions 的请求地址格式：/functions/文件名
                const res  = await fetch('/functions/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: input })
                });
                const data = await res.json();
                if (data.ok) {
                    showMsg('验证成功，正在跳转…', false);
                    setTimeout(() => {
                        window.location.href = `${data.target}?token=${data.token}`;
                    }, 600);
                } else {
                    showMsg(data.error || '验证失败，请重试');
                    loading.value = false;
                }
            } catch {
                showMsg('网络错误，请稍后重试');
                loading.value = false;
            }
        };

        return { code, loading, msg, msgClass, verify };
    }
}).mount('#app');
</script>
</body>
</html>
