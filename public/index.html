<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    animation: flicker 2s infinite;
}

h1 {
    font-size: 22px;
    letter-spacing: 2px;
}

.sub {
    margin-top: 40px;
    font-size: 10px;
    opacity: 0.7;
}

@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.85; }
    100% { opacity: 1; }
}
</style>
</head>

<body>
<div class="container">
    <h1>WELCOME</h1>
    <div class="sub">PSYCHOLOGICAL TESTS</div>
</div>
</body>
</html>
